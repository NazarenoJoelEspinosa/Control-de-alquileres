<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Cilindros</title>

<style>
body{
  font-family: Arial;
  margin: 20px;
  background: #eef1f5;
}

.panel{
  max-width: 900px;
  margin: auto;
}

input, button{
  padding: 7px;
  margin: 4px;
}

.cliente{
  background: white;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  border-left: 6px solid #ccc;
}

.mora{ border-left: 6px solid #e74c3c; }

.pendiente{ background:#fff3cd; }
.enviada{ background:#cfe2ff; }
.pagado{ background:#d1e7dd; }

button{
  border: none;
  cursor: pointer;
  border-radius: 5px;
  background: #333;
  color: white;
  padding: 6px 10px;
}

button:hover{ opacity: 0.8; }

.ph-vencido{ color:red; font-weight:bold; }
.ph-ok{ color:green; }

.small{ font-size: 12px; color: #666; }

.abc-bar{
  margin: 10px 0;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.abc-bar button{
  background:#555;
  font-size: 12px;
  padding: 4px 7px;
}
</style>
</head>

<body>

<div class="panel">

<h2>🔧 Control de Cilindros</h2>

<input id="nombre" placeholder="Cliente">
<input id="pago" type="month">
<button onclick="agregarCliente()">Agregar</button>

<br>

<input id="buscador" oninput="render()" placeholder="Buscar cliente...">

<div class="abc-bar" id="abc"></div>

<hr>

<div id="panel"></div>

</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
let filtroLetra = "";
let busqueda = "";

function guardar(){
  localStorage.setItem("clientes", JSON.stringify(clientes));
}

function mesesAtras(fecha){
  if(!fecha) return 0;
  const hoy = new Date();
  const [y,m] = fecha.split("-");
  return (hoy.getFullYear()-y)*12 + (hoy.getMonth()+1-m);
}

// 🔥 letras A-Z
function renderABC(){
  const abc = document.getElementById("abc");
  const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

  abc.innerHTML = letras.map(l =>
    `<button onclick="setLetra('${l}')">${l}</button>`
  ).join("") + `<button onclick="setLetra('')">Todos</button>`;
}

function setLetra(l){
  filtroLetra = l;
  render();
}

function agregarCliente(){
  clientes.push({
    nombre: document.getElementById("nombre").value,
    pagoHasta: document.getElementById("pago").value,
    estado: "Pendiente",
    cilindros: []
  });

  guardar();
  render();
}

function cambiarEstado(i, estado){
  clientes[i].estado = estado;
  guardar();
  render();
}

function agregarGas(i){
  const gas = prompt("Gas:");
  const cant = prompt("Cantidad:");
  const ph = prompt("PH (YYYY-MM):");

  clientes[i].cilindros.push({ gas, cantidad: parseInt(cant), ph });

  guardar();
  render();
}

function editarCliente(i){
  const c = clientes[i];

  const n = prompt("Nombre:", c.nombre);
  const p = prompt("Pago hasta:", c.pagoHasta);

  if(n) c.nombre = n;
  if(p) c.pagoHasta = p;

  guardar();
  render();
}

function eliminarCliente(i){
  if(confirm("¿Eliminar cliente?")){
    clientes.splice(i,1);
    guardar();
    render();
  }
}

function render(){

  const panel = document.getElementById("panel");
  const buscador = document.getElementById("buscador").value.toLowerCase();

  busqueda = buscador;

  panel.innerHTML = "";

  renderABC();

  // 🔥 ordenar A-Z
  clientes.sort((a,b)=>a.nombre.localeCompare(b.nombre));

  clientes.forEach((c,i)=>{

    // filtros
    if(filtroLetra && !c.nombre.toUpperCase().startsWith(filtroLetra)) return;
    if(busqueda && !c.nombre.toLowerCase().includes(busqueda)) return;

    const deuda = mesesAtras(c.pagoHasta);

    let estadoClass = "";
    if(c.estado === "Pendiente") estadoClass = "pendiente";
    if(c.estado === "Factura enviada") estadoClass = "enviada";
    if(c.estado === "Pagado") estadoClass = "pagado";

    let html = `
      <div class="cliente ${deuda>=3?'mora':''} ${estadoClass}">
        <h3>${c.nombre}</h3>

        <p class="small">💰 Meses atrasados: <b>${deuda}</b></p>
        <p class="small">📌 Estado: <b>${c.estado}</b></p>

        <button onclick="cambiarEstado(${i},'Pendiente')">Pendiente</button>
        <button onclick="cambiarEstado(${i},'Factura enviada')">Factura enviada</button>
        <button onclick="cambiarEstado(${i},'Pagado')">Pagado</button>

        <br><br>

        <button onclick="agregarGas(${i})">+ Gas</button>
        <button onclick="editarCliente(${i})">Editar</button>
        <button onclick="eliminarCliente(${i})">Eliminar</button>

        <ul>
    `;

    c.cilindros.forEach(g=>{
      const vencido = mesesAtras(g.ph) > 0;

      html += `
        <li>
          🧪 ${g.gas} - ${g.cantidad}
          | PH: <span class="${vencido?'ph-vencido':'ph-ok'}">${g.ph}</span>
        </li>
      `;
    });

    html += "</ul></div>";

    panel.innerHTML += html;
  });
}

renderABC();
render();

</script>

</body>
</html>
