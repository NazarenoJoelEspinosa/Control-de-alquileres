<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Cilindros</title>

<style>
body{
  font-family: Arial;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

h2{
  margin-bottom:10px;
}

.topbar{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

input{
  padding:7px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  padding:7px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#2d3436;
  color:white;
}

button:hover{ opacity:0.85; }

.list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* CARD COMPACTA */
.card{
  background:white;
  padding:10px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

/* estados */
.pendiente{ border-left:5px solid #f1c40f; }
.enviada{ border-left:5px solid #3498db; }
.pagado{ border-left:5px solid #2ecc71; }

.left{
  display:flex;
  flex-direction:column;
}

.name{
  font-weight:bold;
}

.meta{
  font-size:12px;
  color:#666;
}

.actions{
  display:flex;
  gap:5px;
  align-items:center;
}

.smallBtn{
  font-size:12px;
  padding:5px 8px;
  background:#444;
}
</style>
</head>

<body>

<div class="container">

<h2>🔧 Control Operativo</h2>

<div class="topbar">
  <input id="nombre" placeholder="Cliente">
  <input id="pago" type="month">
  <input id="rotacion" type="number" placeholder="Rotación">
  <button onclick="addClient()">Agregar</button>
</div>

<div class="topbar">
  <input id="search" placeholder="Buscar cliente..." oninput="render()">
</div>

<div id="panel" class="list"></div>

</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

const save = () =>
  localStorage.setItem("clientes", JSON.stringify(clientes));

function addClient(){
  if(!nombre.value) return;

  clientes.push({
    nombre: nombre.value,
    pagoHasta: pago.value,
    estado: "Pendiente",
    bajaRotacion: Number(rotacion.value) || 0,
    cilindros: []
  });

  nombre.value="";
  pago.value="";
  rotacion.value="";

  save();
  render();
}

/* 🔘 TOGGLE ESTADO */
function toggleStatus(i){
  const order = ["Pendiente","Factura enviada","Pagado"];
  let idx = order.indexOf(clientes[i].estado);
  idx = (idx + 1) % order.length;
  clientes[i].estado = order[idx];

  save();
  render();
}

function addGas(i){
  const gas = prompt("Gas:");
  const cant = prompt("Cantidad:");

  if(!gas || !cant) return;

  clientes[i].cilindros.push({
    gas,
    cantidad:Number(cant)
  });

  save();
  render();
}

function editRotation(i){
  const r = prompt("Rotación:", clientes[i].bajaRotacion);
  clientes[i].bajaRotacion = Number(r)||0;

  save();
  render();
}

function removeClient(i){
  if(confirm("Eliminar cliente?")){
    clientes.splice(i,1);
    save();
    render();
  }
}

function render(){

  const panel = document.getElementById("panel");
  const q = document.getElementById("search").value.toLowerCase();

  panel.innerHTML = "";

  clientes
    .sort((a,b)=>a.nombre.localeCompare(b.nombre))
    .forEach((c,i)=>{

      if(q && !c.nombre.toLowerCase().includes(q)) return;

      let className =
        c.estado==="Pendiente" ? "pendiente" :
        c.estado==="Factura enviada" ? "enviada" :
        "pagado";

      let html = `
        <div class="card ${className}">

          <div class="left">
            <div class="name">${c.nombre}</div>
            <div class="meta">💰 ${c.pagoHasta || "-"}</div>
            <div class="meta">🔄 Rotación: ${c.bajaRotacion}</div>
          </div>

          <div class="actions">

            <button class="smallBtn" onclick="toggleStatus(${i})">
              ${c.estado}
            </button>

            <button class="smallBtn" onclick="addGas(${i})">Gas</button>
            <button class="smallBtn" onclick="editRotation(${i})">Rot</button>
            <button class="smallBtn" onclick="removeClient(${i})">X</button>

          </div>

        </div>
      `;

      panel.innerHTML += html;
  });
}

render();

</script>

</body>
</html>
