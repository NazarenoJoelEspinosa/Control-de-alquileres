<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Cilindros</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
}

h2{
  margin-bottom:15px;
}

.topbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

input{
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  padding:8px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#2d3436;
  color:white;
}

button:hover{
  opacity:0.85;
}

.card{
  background:white;
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
  border-left:5px solid #bbb;
}

.status-pendiente{ border-left-color:#f1c40f; }
.status-enviada{ border-left-color:#3498db; }
.status-pagado{ border-left-color:#2ecc71; }

.meta{
  font-size:13px;
  color:#555;
  margin:4px 0;
}

.actions{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin:8px 0;
}

.actions button{
  font-size:12px;
  padding:6px 8px;
  background:#444;
}

.list{
  font-size:13px;
  margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>Control de Cilindros</h2>

<div class="topbar">
  <input id="nombre" placeholder="Cliente">
  <input id="pago" type="month">
  <input id="rotacion" type="number" placeholder="Baja rotación">
  <button onclick="addClient()">Agregar</button>
</div>

<div id="panel"></div>

</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

const save = () =>
  localStorage.setItem("clientes", JSON.stringify(clientes));

function addClient(){
  if(!nombre.value) return;

  clientes.push({
    nombre: nombre.value,
    pagoHasta: pago.value,
    estado: "Pendiente",
    bajaRotacion: Number(rotacion.value) || 0,
    cilindros: []
  });

  nombre.value="";
  pago.value="";
  rotacion.value="";

  save();
  render();
}

function setStatus(i, st){
  clientes[i].estado = st;
  save();
  render();
}

function addGas(i){
  const gas = prompt("Gas:");
  const cant = prompt("Cantidad:");

  if(!gas || !cant) return;

  clientes[i].cilindros.push({
    gas,
    cantidad: Number(cant)
  });

  save();
  render();
}

function editRotation(i){
  const r = prompt("Baja rotación:", clientes[i].bajaRotacion);
  clientes[i].bajaRotacion = Number(r) || 0;

  save();
  render();
}

function removeClient(i){
  if(confirm("Eliminar cliente?")){
    clientes.splice(i,1);
    save();
    render();
  }
}

function statusClass(st){
  if(st==="Pendiente") return "status-pendiente";
  if(st==="Factura enviada") return "status-enviada";
  if(st==="Pagado") return "status-pagado";
  return "";
}

function render(){

  const panel = document.getElementById("panel");
  panel.innerHTML = "";

  clientes
    .sort((a,b)=>a.nombre.localeCompare(b.nombre))
    .forEach((c,i)=>{

      let html = `
        <div class="card ${statusClass(c.estado)}">

          <b>${c.nombre}</b>

          <div class="meta">📌 ${c.estado}</div>
          <div class="meta">💰 ${c.pagoHasta || "-"}</div>
          <div class="meta">🔄 Rotación: ${c.bajaRotacion}</div>

          <div class="actions">
            <button onclick="setStatus(${i},'Pendiente')">Pendiente</button>
            <button onclick="setStatus(${i},'Factura enviada')">Factura enviada</button>
            <button onclick="setStatus(${i},'Pagado')">Pagado</button>
          </div>

          <div class="actions">
            <button onclick="addGas(${i})">+ Gas</button>
            <button onclick="editRotation(${i})">Rotación</button>
            <button onclick="removeClient(${i})">Eliminar</button>
          </div>

          <div class="list">
      `;

      c.cilindros.forEach(g=>{
        html += `• ${g.gas} (${g.cantidad})<br>`;
      });

      html += `</div></div>`;

      panel.innerHTML += html;
  });
}

render();

</script>

</body>
</html>
