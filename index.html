<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Control Operativo Cilindros</title>

<style>
body{
  font-family: Arial;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

.container{ max-width:900px; margin:auto; }

h2{ margin-bottom:10px; }

.topbar{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

input{
  padding:7px;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  padding:7px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#2d3436;
  color:white;
}

button:hover{ opacity:0.85; }

/* LISTA */
.list{ display:flex; flex-direction:column; gap:8px; }

.card{
  background:white;
  padding:10px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.pendiente{ border-left:5px solid #f1c40f; }
.enviada{ border-left:5px solid #3498db; }
.pagado{ border-left:5px solid #2ecc71; }

.meta{ font-size:12px; color:#666; }

.smallBtn{
  font-size:12px;
  padding:5px 8px;
  background:#444;
  margin-left:4px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:white;
  width:500px;
  max-height:80vh;
  overflow:auto;
  padding:15px;
  border-radius:10px;
}

.close{
  float:right;
  cursor:pointer;
  font-size:18px;
}

.section{
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid #ddd;
}

.small{ font-size:12px; color:#666; }
</style>
</head>

<body>

<div class="container">

<h2>🔧 Control Operativo</h2>

<div class="topbar">
  <input id="nombre" placeholder="Cliente">
  <input id="pago" type="month">
  <input id="rotacion" type="number" placeholder="Rotación">
  <button onclick="addClient()">Agregar</button>
</div>

<div class="topbar">
  <input id="search" placeholder="Buscar..." oninput="render()">
</div>

<div id="panel" class="list"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>

    <h3 id="m-name"></h3>

    <p class="small">Estado: <span id="m-status"></span></p>
    <p class="small">Pago hasta: <span id="m-pay"></span></p>
    <p class="small">Rotación: <span id="m-rot"></span></p>

    <div class="section">
      <button onclick="toggleStatus()">Cambiar estado</button>
      <button onclick="setPaid()">Marcar pagado</button>
    </div>

    <div class="section">
      <h4>Cilindros</h4>
      <button onclick="addGasModal()">+ Gas</button>
      <div id="m-cyl"></div>
    </div>

  </div>
</div>

<script>

let clientes = JSON.parse(localStorage.getItem("clientes")) || [];
let selected = null;

const save = () =>
  localStorage.setItem("clientes", JSON.stringify(clientes));

function addClient(){
  clientes.push({
    nombre:nombre.value,
    pagoHasta:pago.value,
    estado:"Pendiente",
    bajaRotacion:Number(rotacion.value)||0,
    cilindros:[]
  });

  nombre.value="";
  pago.value="";
  rotacion.value="";

  save();
  render();
}

function openModal(i){
  selected = i;
  const c = clientes[i];

  document.getElementById("modal").style.display="flex";

  document.getElementById("m-name").innerText = c.nombre;
  document.getElementById("m-status").innerText = c.estado;
  document.getElementById("m-pay").innerText = c.pagoHasta || "-";
  document.getElementById("m-rot").innerText = c.bajaRotacion;

  renderModal();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function toggleStatus(){
  const order=["Pendiente","Factura enviada","Pagado"];
  let i = order.indexOf(clientes[selected].estado);
  clientes[selected].estado = order[(i+1)%3];

  save();
  render();
  openModal(selected);
}

function setPaid(){
  const now = new Date();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const y = now.getFullYear();

  clientes[selected].estado = "Pagado";
  clientes[selected].pagoHasta = `${y}-${m}`;

  save();
  render();
  openModal(selected);
}

function addGasModal(){
  const gas = prompt("Gas:");
  const cant = prompt("Cantidad:");

  clientes[selected].cilindros.push({
    gas,
    cantidad:Number(cant)
  });

  save();
  renderModal();
}

function renderModal(){
  const c = clientes[selected];
  const div = document.getElementById("m-cyl");

  div.innerHTML = "";

  c.cilindros.forEach((g,i)=>{
    div.innerHTML += `
      <p>🧪 ${g.gas} - ${g.cantidad}</p>
    `;
  });
}

function render(){

  const panel = document.getElementById("panel");
  const q = search.value.toLowerCase();

  panel.innerHTML = "";

  clientes
    .sort((a,b)=>a.nombre.localeCompare(b.nombre))
    .forEach((c,i)=>{

      if(q && !c.nombre.toLowerCase().includes(q)) return;

      let cls =
        c.estado==="Pendiente"?"pendiente":
        c.estado==="Factura enviada"?"enviada":"pagado";

      panel.innerHTML += `
        <div class="card ${cls}">

          <div>
            <b>${c.nombre}</b>
            <div class="meta">${c.estado} | ${c.pagoHasta||"-"}</div>
          </div>

          <div>
            <button class="smallBtn" onclick="openModal(${i})">Ver</button>
          </div>

        </div>
      `;
    });
}

render();

</script>

</body>
</html>
